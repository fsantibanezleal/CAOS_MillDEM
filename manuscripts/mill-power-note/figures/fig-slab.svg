<svg xmlns="http://www.w3.org/2000/svg" width="720" height="332" viewBox="0 0 720 332" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="sah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1a1a2e"/>
    </marker>
    <marker id="sag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2f7d3a"/>
    </marker>
  </defs>

  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">The thin-3D slab: why the torque arm scales with mill radius</text>

  <!-- LEFT: the mill cross-section with lifted charge crescent -->
  <text x="150" y="52" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1a1a2e">mill cross-section</text>
  <circle cx="150" cy="170" r="98" fill="#ffffff" stroke="#1a1a2e" stroke-width="2"/>
  <!-- charge crescent: a tilted bed lifted on the driven (right) side -->
  <path d="M 150 170
           L 68 118
           A 98 98 0 0 1 236 140
           A 60 60 0 0 0 150 170 Z"
        fill="#eaf2f8" stroke="#1b6ca8" stroke-width="1.4"/>
  <!-- lifters / rotation arrow -->
  <path d="M 150 62 A 108 108 0 0 1 246 118" fill="none" stroke="#2f7d3a" stroke-width="1.6" marker-end="url(#sag)"/>
  <text x="228" y="92" font-size="10.5" fill="#2f7d3a">&#969;</text>
  <!-- centre + CoM + torque arm -->
  <circle cx="150" cy="170" r="2.6" fill="#1a1a2e"/>
  <text x="150" y="188" text-anchor="middle" font-size="9.5" fill="#1a1a2e">axis</text>
  <circle cx="188" cy="132" r="4" fill="#c15a22"/>
  <text x="198" y="126" font-size="9.8" fill="#c15a22">charge CoM</text>
  <line x1="150" y1="170" x2="188" y2="132" stroke="#c15a22" stroke-width="1.5"/>
  <text x="150" y="150" font-size="10" fill="#c15a22" transform="rotate(-45 168 151)">arm</text>
  <!-- radius R -->
  <line x1="150" y1="170" x2="248" y2="170" stroke="#999" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="212" y="184" font-size="10" fill="#666">R</text>

  <!-- MIDDLE arrow: extract a slab -->
  <line x1="262" y1="170" x2="318" y2="170" stroke="#1a1a2e" stroke-width="1.6" marker-end="url(#sah)"/>
  <text x="290" y="160" text-anchor="middle" font-size="9.5" fill="#555">extract</text>
  <text x="290" y="184" text-anchor="middle" font-size="9.5" fill="#555">axial slab</text>

  <!-- RIGHT: the thin slab, periodic in z, packed with balls + force chains -->
  <text x="470" y="52" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1a1a2e">thin axial slab (periodic in z)</text>
  <!-- slab box (perspective) -->
  <path d="M 360 100 L 560 100 L 590 130 L 390 130 Z" fill="#f4f7fb" stroke="#1b6ca8" stroke-width="1.3"/>
  <path d="M 360 100 L 360 250 L 390 280 L 390 130 Z" fill="#e7eef7" stroke="#1b6ca8" stroke-width="1.3"/>
  <path d="M 360 250 L 560 250 L 590 280 L 390 280 Z" fill="#eef3f8" stroke="#1b6ca8" stroke-width="1.3"/>
  <rect x="360" y="100" width="200" height="150" fill="#ffffff" fill-opacity="0.35" stroke="#1a1a2e" stroke-width="1.6"/>
  <!-- packed balls (a few) -->
  <g fill="#cfe0ef" stroke="#1b6ca8" stroke-width="0.8">
    <circle cx="392" cy="232" r="12"/><circle cx="418" cy="232" r="12"/><circle cx="444" cy="232" r="12"/>
    <circle cx="470" cy="232" r="12"/><circle cx="496" cy="232" r="12"/><circle cx="522" cy="232" r="12"/>
    <circle cx="405" cy="210" r="12"/><circle cx="431" cy="210" r="12"/><circle cx="457" cy="210" r="12"/>
    <circle cx="483" cy="210" r="12"/><circle cx="509" cy="210" r="12"/>
    <circle cx="418" cy="188" r="12"/><circle cx="444" cy="188" r="12"/><circle cx="470" cy="188" r="12"/>
  </g>
  <!-- force chains (thick lines through contacts, carrying the lift) -->
  <g stroke="#c15a22" stroke-width="2" fill="none" opacity="0.85">
    <path d="M 392 244 L 405 210 L 418 188"/>
    <path d="M 444 244 L 457 210 L 470 188"/>
    <path d="M 496 244 L 509 210 L 483 210"/>
  </g>
  <text x="600" y="196" font-size="9.5" fill="#c15a22">force</text>
  <text x="600" y="209" font-size="9.5" fill="#c15a22">chains</text>
  <!-- slab thickness w -->
  <line x1="360" y1="262" x2="390" y2="292" stroke="#666" stroke-width="1"/>
  <text x="352" y="285" font-size="10" fill="#666">w &#8776; 4 d</text>

  <!-- bottom equations / argument -->
  <text x="360" y="308" text-anchor="middle" font-size="10.2" fill="#1a1a2e">2D disc: lift is a size-independent absolute height, so arm / R shrinks with size.  3D slab: force chains carry the drive, so arm scales with R (dynamic similarity).</text>
  <text x="360" y="324" text-anchor="middle" font-size="10.2" font-style="italic" fill="#444">Net power (van Nierop torque route): P = 2&#960; T N, scaled by length / w.</text>
</svg>
